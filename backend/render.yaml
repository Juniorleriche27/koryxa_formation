services:
  - type: web
    name: koryxa-formation-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: KORYXA_IDENTITY_BRIDGE_KEY
        sync: false
      - key: FORMATION_COOKIE_DOMAIN
        value: .koryxa.fr
      - key: CORS_ORIGINS
        value: https://formation.koryxa.fr,http://localhost:3000
      - key: COHERE_API_KEY
        sync: false
      - key: COHERE_MODEL
        value: command-r-08-2024
